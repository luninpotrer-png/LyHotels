{% extends "base.html" %}
{% block contenido %}
<h1>Panel de Aprobación</h1>
<table>
    <tr>
        <th>Hotel</th>
        <th>Dueño</th>
        <th>Acción</th>
    </tr>
    {% for h in hoteles_pendientes %}
    <tr>
        <td>{{ h.nombre }}</td>
        <td>{{ h.dueno.username }}</td> <td>
            <a href="/admin/aprobar/{{ h.id }}">✅ Aprobar</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
