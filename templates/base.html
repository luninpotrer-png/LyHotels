<!DOCTYPE html>
<html lang="es">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-MC38369S');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyHotels - Huaura</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        nav { background: #2c3e50; padding: 1rem; color: white; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin: 0 10px; font-weight: 600; }
        .footer { background: #2c3e50; color: white; text-align: center; padding: 20px 0; margin-top: auto; }
        .ceo-badge { background: gold; color: black; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; margin-left: 10px; }
        main { flex: 1; }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MC38369S"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <nav>
        <div class="logo">
            <a href="/">🏨 LyHotels</a>
        </div>
        <div class="menu">
            <a href="/">Inicio</a>
            {% if session.get('user_id') %}
                <a href="/crear">Registrar Hotel</a>
                <a href="/logout">Cerrar Sesión</a>
                <span class="ceo-badge">CEO: {{ session.get('username') }}</span>
            {% else %}
                <a href="/login">Login</a>
                <a href="/register">Registro</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 LyHotels Huaura - Plataforma Profesional de Gestión</p>
        <p>Desarrollado por Owen - Lead Developer</p>
    </footer>
</body>
</html>
