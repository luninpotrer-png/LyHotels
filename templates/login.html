{% extends "base.html" %}
{% block contenido %}
<div class="auth-container">
    <div class="auth-box">
        <h1>Bienvenido</h1>
        <p>Ingresa tus credenciales para continuar</p>

        {% if error %}
            <p class="error-msg">⚠️ {{ error }}</p>
        {% endif %}

        <form action="/login" method="POST" onsubmit="return validar_inputs()">
            <div class="input-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" placeholder="Tu usuario" required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">Entrar</button>
        </form>
        <p class="auth-footer">¿No tienes cuenta? <a href="/registro">Regístrate aquí</a></p>
    </div>
</div>
{% endblock %}
