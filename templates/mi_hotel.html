{% extends "base.html" %}

{% block contenido %}
<div class="panel-container">
    <h1 class="panel-title">Gestión de mi Hotel</h1>

    {% if hotel %}
        <div class="manage-card">
            <img src="{{ hotel.imagen_url }}" alt="{{ hotel.nombre }}">
            <div class="manage-info">
                <h3>{{ hotel.nombre }}</h3>
                <p class="status">
                    Estado:
                    {% if hotel.aprobado %}
                        <span class="aprobado"><i class="fas fa-check-circle"></i> Aprobado</span>
                    {% else %}
                        <span class="pendiente"><i class="fas fa-clock"></i> Pendiente</span>
                    {% endif %}
                </p>
            </div>
            <div class="manage-actions">
                <a href="/borrar/{{ hotel.id }}" class="btn-borrar">Borrar Hotel</a>
            </div>
        </div>
    {% else %}
        <div class="empty-management">
            <p>Aún no has registrado ningún hotel.</p>
            <a href="/crear" class="btn-ver">Registrar mi primer hotel</a>
        </div>
    {% endif %}
</div>
{% endblock %}
